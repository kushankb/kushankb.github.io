// ---- CROP DATA ----
// yield = max attainable yield (qtl/acre) at score 100
// score = GAEZ suitability for THIS location (0-100)
// actual yield = yield * score/100
const CROPS = {

  cotton: { name: "Cotton (Kapas)", season: "kharif", score: 41, fit: "Mushkil", fitEn: "Risky here", color: C.danger, priceSwing: 3, msp: "Medium", price: 6600, maxYield: 19.5, input: 24500, water: 1200, nfix: 0, soil: 400, fert: 800, mapHue: 30 },
};

const BASE = { trueNet: 41200 };

// Suitability-adjusted yield
function adjYield(crop) { return Math.round(crop.maxYield * crop.score / 100 * 10) / 10; }

function calc(rk, kk, yr) {
  const r = CROPS[rk], k = CROPS[kk];
  const rY = adjYield(r), kY = adjYield(k);
  const rRev = Math.round(r.price * rY), kRev = Math.round(k.price * kY);
  const conv = rRev + kRev - r.input - k.input;
  const m = 1 + (yr - 1) * .12;
  const ben = Math.round((r.water + k.water + r.nfix + k.nfix + r.soil + k.soil + r.fert + k.fert) * m);
  return { conv: Math.round(conv), ben, net: Math.round(conv + ben), rRev, kRev, rIn: r.input, kIn: k.input, rY, kY };
}

}
function MspBadge({ level }) {

function SuitBadge({ score }) {
  const bg = score >= 75 ? C.okBg : score >= 55 ? C.goldLight : C.dangerBg;

  const pct = Math.round(score);
  return <span style={{ padding: "2px 8px", borderRadius: 8, fontSize: 10, fontWeight: 700, background: bg, color: c }}>{pct}% fit</span>;

    ? "linear-gradient(135deg, #C5D99E, #A3C476 30%, #8AB85A 60%, #6DA63E 80%, #78B04A)"
    : sc.score >= 55

      <p style={{ fontSize: 13, color: C.muted, marginBottom: 14 }}>Tap a crop to see how it fits your land (GAEZ + Soil Health Card)</p>

      {/* Crop toggle pills */}

// =================== PRICES ===================
function Prices() {
  const ref = useRef(null);
  const crops = [
    { name: "Wheat", swing: 1, msp: "High" }, { name: "Rice", swing: 1, msp: "High" },
    { name: "Chickpea", swing: 2, msp: "Low" }, { name: "Mustard", swing: 2, msp: "Medium" },
    { name: "Maize", swing: 1, msp: "Medium" }, { name: "Mung bean", swing: 3, msp: "Low" },
  ];
  useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const w = cv.width = cv.offsetWidth * 2, h = cv.height = cv.offsetHeight * 2;
    ctx.scale(2, 2); const cw = w / 2, ch = h / 2;
    const ms = ["O", "N", "D", "J", "F", "M", "A", "M", "J"];
    const mid = [4800, 4900, 5100, 5300, 5500, 5200, 4900, 4700, 4600];
    const hi = [5600, 5800, 6200, 6500, 6800, 6400, 5900, 5500, 5400];
    const lo = [4100, 4200, 4300, 4400, 4500, 4200, 4000, 3900, 3800];
    const px = i => 40 + (i / 8) * (cw - 60), py = v => ch - 30 - ((v - 3500) / 3500) * (ch - 50);
    ctx.beginPath(); for (let i = 0; i < 9; i++) ctx.lineTo(px(i), py(hi[i]));
    for (let i = 8; i >= 0; i--) ctx.lineTo(px(i), py(lo[i]));
    ctx.closePath(); ctx.fillStyle = "rgba(200,149,46,.12)"; ctx.fill();
    ctx.beginPath(); for (let i = 0; i < 9; i++) { i ? ctx.lineTo(px(i), py(mid[i])) : ctx.moveTo(px(i), py(mid[i])); }
    ctx.strokeStyle = C.gold; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = C.muted; ctx.font = "11px DM Sans,sans-serif"; ctx.textAlign = "center";
    ms.forEach((m, i) => ctx.fillText(m, px(i), ch - 10));
    ctx.textAlign = "right";
    [4000, 5000, 6000, 7000].forEach(v => { ctx.fillText("₹" + (v / 1000) + "k", 34, py(v) + 4); ctx.strokeStyle = "rgba(0,0,0,.05)"; ctx.lineWidth = .5; ctx.beginPath(); ctx.moveTo(40, py(v)); ctx.lineTo(cw - 20, py(v)); ctx.stroke(); });
    ctx.fillStyle = C.gold; ctx.textAlign = "left"; ctx.font = "bold 12px DM Sans,sans-serif";
    ctx.fillText("Chickpea mandi price (₹/quintal)", 40, 18);
    ctx.font = "11px DM Sans,sans-serif"; ctx.fillStyle = C.muted;
    ctx.fillText("Shaded area = price range over 5 years", 40, 34);
  }, []);
  return (
    <div style={{ padding: "24px 20px" }}>
      <h2 className="sf" style={{ fontSize: 24, color: C.earth, marginBottom: 4 }}>Kya daam pakka milega?</h2>
      <p style={{ fontSize: 13, color: C.muted, marginBottom: 20 }}>5-year mandi price history from Agmarknet</p>
      <div style={{ borderRadius: 14, background: C.card, border: `1px solid ${C.border}`, padding: 12, marginBottom: 20 }}><canvas ref={ref} style={{ width: "100%", height: 200 }} /></div>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 10 }}>Price safety of each crop</div>
      {crops.map((c, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderRadius: 10, background: i % 2 === 0 ? C.warm : C.card, border: `1px solid ${C.border}`, marginBottom: 6 }}>
          <span style={{ fontSize: 13, fontWeight: 600, minWidth: 80 }}>{c.name}</span>
          <SwingDots level={c.swing} />
          <MspBadge level={c.msp} />
        </div>
      ))}
      <div style={{ marginTop: 14, padding: 14, borderRadius: 12, background: C.earthPale, fontSize: 13, color: C.earth, lineHeight: 1.6 }}>
        <strong>Don't worry about ups and downs:</strong> Chickpea prices move more than wheat, but earn 2.4× more. Even in the worst year, you earn more per acre.
      </div>
    </div>
  );
}

// =================== BUILDER (sorted by suitability, with warnings) ===================
function Builder({ rabi, kharif, setRabi, setKharif, onGo }) {
  const rList = Object.entries(CROPS).filter(([, v]) => v.season === "rabi").sort(([, a], [, b]) => b.score - a.score);
  const kList = Object.entries(CROPS).filter(([, v]) => v.season === "kharif").sort(([, a], [, b]) => b.score - a.score);

  const Opt = ({ ck, cr, sel, pick }) => {
    const on = sel === ck;
    const low = cr.score < 50;
    const ay = adjYield(cr);
    return (
      <button onClick={() => pick(ck)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "14px 16px", borderRadius: 14, border: on ? `2px solid ${C.earth}` : low ? `1.5px dashed ${C.danger}` : `1.5px solid ${C.border}`, background: on ? C.earthPale : low ? "#FFF9F5" : C.card, cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all .2s", boxShadow: on ? "0 0 0 3px rgba(45,80,22,.1)" : "none", opacity: low && !on ? .85 : 1 }}>
        <div style={{ width: 42, height: 42, borderRadius: 21, background: on ? C.earth : `${cr.color}18`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <span className="sf" style={{ fontSize: 16, color: on ? "#fff" : cr.color, lineHeight: 1 }}>{cr.score}</span>
          <span style={{ fontSize: 8, color: on ? "rgba(255,255,255,.7)" : C.muted }}>fit</span>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 14, fontWeight: 600, color: on ? C.earth : C.ink }}>{cr.name}</span>
            {low && <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 6, background: C.dangerBg, color: C.danger, fontWeight: 700 }}>Risky</span>}
          </div>
          <div style={{ fontSize: 12, color: on ? C.earthLight : C.muted, marginTop: 2 }}>
            Yield: <strong>{ay}</strong>/{cr.maxYield} qtl · ₹{cr.price.toLocaleString()}/qtl
          </div>
          <div style={{ marginTop: 3 }}><SwingDots level={cr.priceSwing} /></div>
        </div>
        <div style={{ width: 24, height: 24, borderRadius: 12, border: on ? `2px solid ${C.earth}` : `2px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          {on && <div style={{ width: 12, height: 12, borderRadius: 6, background: C.earth }} />}
        </div>
      </button>
    );
  };

  const ok = rabi && kharif;
  const pv = ok ? calc(rabi, kharif, 1) : null;
  const lowWarn = ok && (CROPS[rabi].score < 50 || CROPS[kharif].score < 50);

  return (
    <div style={{ padding: "24px 20px" }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 12, color: C.gold, fontWeight: 600, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>Ab aapki baari</div>
        <h2 className="sf" style={{ fontSize: 26, color: C.earth, lineHeight: 1.2 }}>Apna rotation chunein</h2>
        <p style={{ fontSize: 14, color: C.muted, marginTop: 6, lineHeight: 1.5 }}>Crops are ranked by how well they fit your soil. Yield shown is adjusted to your land — not the maximum possible.</p>
      </div>

      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <div style={{ padding: "4px 12px", borderRadius: 8, background: "#E0ECFF", fontSize: 11, fontWeight: 700, color: "#2956A8", textTransform: "uppercase", letterSpacing: 1 }}>Rabi</div>
          <span style={{ fontSize: 13, color: C.muted }}>Winter (Oct – Mar) · best fit first</span>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{rList.map(([k, v]) => <Opt key={k} ck={k} cr={v} sel={rabi} pick={setRabi} />)}</div>
      </div>
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <div style={{ padding: "4px 12px", borderRadius: 8, background: "#FFECD6", fontSize: 11, fontWeight: 700, color: "#8B5A1B", textTransform: "uppercase", letterSpacing: 1 }}>Kharif</div>
          <span style={{ fontSize: 13, color: C.muted }}>Monsoon (Jun – Oct) · best fit first</span>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{kList.map(([k, v]) => <Opt key={k} ck={k} cr={v} sel={kharif} pick={setKharif} />)}</div>
      </div>

      {lowWarn && <div className="ap" style={{ padding: "12px 14px", borderRadius: 10, background: C.dangerBg, border: `1px solid rgba(192,86,33,.2)`, fontSize: 13, color: C.danger, marginBottom: 16, lineHeight: 1.5 }}>
        ⚠ One of your crops has low suitability (below 50%) for your soil. This means lower yield and higher risk. The economics below reflect this — consider switching to a better-fit crop.
      </div>}

      {ok && (
        <div className="ap" style={{ padding: 18, borderRadius: 16, background: `linear-gradient(135deg, ${C.earth}, ${C.earthLight})`, color: "#fff", marginBottom: 16 }}>
          <div style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.5, opacity: .65, marginBottom: 10 }}>Quick look · Year 1 · Suitability-adjusted</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 13, opacity: .8 }}>{CROPS[rabi].name.split(" (")[0]} + {CROPS[kharif].name.split(" (")[0]}</div>
              <div className="sf" style={{ fontSize: 30, marginTop: 2 }}>₹{pv.net.toLocaleString()}</div>
              <div style={{ fontSize: 12, opacity: .65 }}>/acre/year (full picture)</div>
            </div>
            <div style={{ textAlign: "center", padding: "8px 14px", borderRadius: 10, background: pv.net > BASE.trueNet ? "rgba(255,255,255,.18)" : "rgba(255,100,100,.2)" }}>

              <div style={{ fontSize: 10, opacity: .7 }}>vs wheat-rice</div>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            {[{ l: "💧 Water saved", v: CROPS[rabi].water + CROPS[kharif].water }, { l: "🌱 Soil benefit", v: CROPS[rabi].nfix + CROPS[kharif].nfix + CROPS[rabi].soil + CROPS[kharif].soil }, { l: "⬇ Less fertilizer", v: CROPS[rabi].fert + CROPS[kharif].fert }].map((x, i) => (
              <div key={i} style={{ padding: "8px 6px", borderRadius: 8, background: "rgba(255,255,255,.1)", textAlign: "center" }}>
                <div style={{ fontSize: 14, fontWeight: 700 }}>₹{x.v.toLocaleString()}</div>
                <div style={{ fontSize: 10, opacity: .65, marginTop: 2 }}>{x.l}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      <button onClick={onGo} disabled={!ok} style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", background: ok ? C.earth : C.border, color: "#fff", fontSize: 15, fontWeight: 600, cursor: ok ? "pointer" : "default", fontFamily: "inherit", opacity: ok ? 1 : .5 }}>
        {ok ? "Poora hisaab dekhein (5-year) →" : "Choose one rabi + one kharif crop above"}
      </button>
    </div>
  );
}

// =================== MY PLAN (suitability-adjusted) ===================
function MyPlan({ rabi, kharif }) {
  const [yr, setYr] = useState(1);
  if (!rabi || !kharif) return <div style={{ padding: 40, textAlign: "center", color: C.muted }}>Pehle apna rotation chunein.</div>;
  const rc = CROPS[rabi], kc = CROPS[kharif];
  const nm = `${rc.name.split(" (")[0]} + ${kc.name.split(" (")[0]}`;
  const e = calc(rabi, kharif, yr);
  const bt = BASE.trueNet - (yr - 1) * 350;
  const mx = Math.max(e.net, bt) * 1.15;
  const bar = (v, c) => ({ width: `${Math.max(0, (v / mx) * 100)}%`, height: 20, borderRadius: 5, background: c, transition: "width .4s" });
  const diff = e.net - bt;

  return (
    <div style={{ padding: "24px 20px" }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 12, color: C.gold, fontWeight: 600, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>Aapka plan</div>

        ))}
        <div style={{ marginTop: 14, textAlign: "center", padding: 12, borderRadius: 10, background: diff > 0 ? C.okBg : C.dangerBg }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: diff > 0 ? C.ok : C.danger }}>{diff > 0 ? "+" : ""}₹{diff.toLocaleString()}/acre/year</div>
          <div style={{ fontSize: 12, color: diff > 0 ? C.ok : C.danger, opacity: .7, marginTop: 2 }}>{diff > 0 ? `Aapka plan ${yr === 1 ? "pehle saal se" : "year " + yr + " tak"} zyada kamata hai` : "Zyada upyukt fasal chunein — soil fit matters!"}</div>
        </div>
      </div>

      <div className="au" style={{ animationDelay: ".2s", padding: 16, borderRadius: 14, background: C.goldLight, border: `1px solid rgba(200,149,46,.2)` }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 6 }}>Poore 5 acre pe (year {yr})</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 8 }}>
          <div><div style={{ fontSize: 12, color: "#8B6A3D" }}>Wheat-rice (asli)</div><div style={{ fontSize: 20, fontWeight: 700, color: "#6B3F0E" }}>₹{(bt * 5).toLocaleString()}</div></div>
          <div><div style={{ fontSize: 12, color: "#8B6A3D" }}>Aapka plan (asli)</div><div style={{ fontSize: 20, fontWeight: 700, color: C.earth }}>₹{(e.net * 5).toLocaleString()}</div></div>
        </div>
        {diff > 0 && <div style={{ marginTop: 10, fontSize: 15, fontWeight: 600, color: C.earth }}>₹{(diff * 5).toLocaleString()} zyada — poori zameen pe!</div>}
      </div>
    </div>
  );
}

// =================== DATA ===================
function Data() {
  const s = [
    { name: "GAEZ v4 (FAO)", type: "Which crop fits where + yield potential", st: "open" },
    { name: "Agmarknet / data.gov.in", type: "Daily mandi prices", st: "open" },
    { name: "CEDA (Ashoka Univ.)", type: "5-year price history", st: "open" },
    { name: "Soil Health Card", type: "Your soil report (adjusts yield)", st: "semi" },
    { name: "CACP / DES", type: "Input costs by crop", st: "open" },
    { name: "AgriStack", type: "Farmer ID + land records", st: "open" },
    { name: "ICAR / KVK", type: "Local crop trial results", st: "partner" },
  ];
  return (
    <div style={{ padding: "24px 20px" }}>
      <h2 className="sf" style={{ fontSize: 24, color: C.earth, marginBottom: 4 }}>Where does the data come from?</h2>
      <p style={{ fontSize: 13, color: C.muted, marginBottom: 20 }}>All government and scientific sources — no guesswork</p>
      {s.map((x, i) => (
        <div key={i} className="as" style={{ animationDelay: `${i * .04}s`, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", borderRadius: 12, background: C.card, border: `1px solid ${C.border}`, marginBottom: 8 }}>
          <div><div style={{ fontSize: 14, fontWeight: 600 }}>{x.name}</div><div style={{ fontSize: 12, color: C.muted }}>{x.type}</div></div>
          <span style={{ padding: "3px 10px", borderRadius: 10, fontSize: 10, fontWeight: 700, textTransform: "uppercase",
            background: x.st === "open" ? C.okBg : x.st === "semi" ? C.goldLight : C.blueBg,
            color: x.st === "open" ? C.ok : x.st === "semi" ? C.gold : C.blue }}>{x.st === "open" ? "Free" : x.st === "semi" ? "Linked" : "Partner"}</span>
        </div>
      ))}
    </div>
  );
}

// =================== APP ===================
window.__App = function App() {
  const [scr, setScr] = useState("splash");
  const [nav, setNav] = useState(false);
  const [rabi, setRabi] = useState(null);
  const [kharif, setKharif] = useState(null);
  const ix = SCR.findIndex(s => s.id === scr);
  return (
    <div style={{ maxWidth: 420, margin: "0 auto", minHeight: "100vh", display: "flex", flexDirection: "column", background: C.warm, position: "relative", fontFamily: "'DM Sans',sans-serif" }}>
      <style>{css}</style>
      {scr !== "splash" && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", borderBottom: `1px solid ${C.border}`, background: C.card, position: "sticky", top: 0, zIndex: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}><span className="sf" style={{ fontSize: 18, color: C.earth }}>Khet Vividhata</span><span style={{ fontSize: 11, color: C.muted }}>prototype</span></div>
          <button onClick={() => setNav(!nav)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", padding: 4, color: C.muted }}>☰</button>
        </div>
      )}
      {nav && (
        <div className="af" style={{ position: "absolute", top: 48, right: 12, zIndex: 20, background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, boxShadow: "0 8px 30px rgba(0,0,0,.1)", padding: "8px 0", minWidth: 200 }}>
          {SCR.filter(s => s.id !== "splash").map(s => (
            <button key={s.id} onClick={() => { setScr(s.id); setNav(false); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "10px 16px", background: s.id === scr ? C.earthPale : "transparent", border: "none", fontSize: 13, color: s.id === scr ? C.earth : C.ink, fontWeight: s.id === scr ? 600 : 400, cursor: "pointer", fontFamily: "inherit" }}>
              {s.id === "builder" || s.id === "myplan" ? "★ " + s.label : s.label}
            </button>
          ))}
        </div>
      )}
      <div key={scr} className="af" style={{ flex: 1, overflow: "auto" }}>
        {scr === "splash" && <Splash onNext={() => setScr("profile")} />}
        {scr === "profile" && <Profile />}
        {scr === "dash" && <Dash />}
        {scr === "compare" && <Compare />}
        {scr === "map" && <MapScr />}
        {scr === "prices" && <Prices />}
        {scr === "builder" && <Builder rabi={rabi} kharif={kharif} setRabi={setRabi} setKharif={setKharif} onGo={() => setScr("myplan")} />}
        {scr === "myplan" && <MyPlan rabi={rabi} kharif={kharif} />}
        {scr === "data" && <Data />}
      </div>
      {scr !== "splash" && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 20px", borderTop: `1px solid ${C.border}`, background: C.card }}>
          <button onClick={() => ix > 1 && setScr(SCR[ix - 1].id)} disabled={ix <= 1} style={{ padding: "8px 18px", borderRadius: 20, border: `1px solid ${C.border}`, background: "transparent", fontSize: 13, fontWeight: 500, cursor: ix <= 1 ? "default" : "pointer", opacity: ix <= 1 ? .3 : 1, fontFamily: "inherit", color: C.ink }}>← Back</button>
          <div style={{ fontSize: 12, color: C.muted }}>{ix}/{SCR.length - 1}</div>
          <button onClick={() => ix < SCR.length - 1 && setScr(SCR[ix + 1].id)} disabled={ix >= SCR.length - 1} style={{ padding: "8px 18px", borderRadius: 20, border: "none", background: ix >= SCR.length - 1 ? C.border : C.earth, color: "#fff", fontSize: 13, fontWeight: 500, cursor: ix >= SCR.length - 1 ? "default" : "pointer", fontFamily: "inherit" }}>Next →</button>
        </div>
      )}
    </div>
  );
}

const App = window.__App;
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
